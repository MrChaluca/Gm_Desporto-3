<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GM Desporto — Alterar Senha</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .senha-card {
        width: min(420px, 100%);
        animation: fadeUp 0.35s ease-out;
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .senha-icon {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--wine-light), var(--wine-dark));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.8rem;
        margin: 0 auto 1.2rem;
        box-shadow: 0 8px 24px rgba(123, 18, 36, 0.45);
      }

      .senha-form {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-top: 1.2rem;
      }

      .password-wrapper {
        position: relative;
      }

      .password-wrapper input {
        padding-right: 44px !important;
      }

      .toggle-pass {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-muted);
        font-size: 1rem;
        padding: 0;
        line-height: 1;
      }

      .toggle-pass:hover { color: var(--wine-dark); }

      .senha-msg {
        text-align: center;
        font-size: 0.88rem;
        min-height: 22px;
        border-radius: 8px;
        padding: 4px 8px;
      }

      .senha-msg.success { color: #1a7a4a; font-weight: 600; }
      .senha-msg.error   { color: #c0392b; font-weight: 600; }

      .strength-bar {
        height: 4px;
        border-radius: 999px;
        background: #e0e0e0;
        overflow: hidden;
        margin-top: 4px;
      }

      .strength-fill {
        height: 100%;
        border-radius: 999px;
        width: 0%;
        transition: width 300ms ease-out, background-color 300ms ease-out;
      }

      .strength-label {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 3px;
      }
    </style>
  </head>
  <body>
    <div class="page-wrapper">
      <header class="top-header">
        <div class="top-left">
          <a href="perfil.html" class="btn-back-top">← Voltar</a>
          <div class="brand-main">
            <div class="brand-text">
              <span class="brand-title">GM Desporto</span>
              <span class="brand-subtitle">Alterar Senha</span>
            </div>
          </div>
        </div>
        <div class="brand-school">
          <img
            src="imagens/logogm.png"
            alt="Agrupamento de Escolas Dr. Ginestal Machado"
            class="logo-school"
          />
        </div>
      </header>

      <main class="content">
        <div class="card senha-card">

          <div class="senha-icon">🔑</div>

          <div class="card-header" style="margin-bottom:0; padding-bottom:0;">
            <h1 class="card-title" style="font-size:1.2rem;">Alterar senha</h1>
            <p class="card-subtitle">Introduza a sua senha atual e depois a nova senha.</p>
          </div>

          <form class="senha-form" id="senhaForm" novalidate>

            <div class="form-group">
              <label for="senhaAtual">Senha atual</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="senhaAtual"
                  name="senhaAtual"
                  placeholder="••••••••"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="toggle-pass" data-target="senhaAtual" title="Mostrar/ocultar">👁</button>
              </div>
            </div>

            <div class="form-group">
              <label for="senhaNova">Nova senha</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="senhaNova"
                  name="senhaNova"
                  placeholder="Mínimo 6 caracteres"
                  autocomplete="new-password"
                  required
                />
                <button type="button" class="toggle-pass" data-target="senhaNova" title="Mostrar/ocultar">👁</button>
              </div>
              <!-- Barra de força da senha -->
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="form-group">
              <label for="senhaConfirmar">Confirmar nova senha</label>
              <div class="password-wrapper">
                <input
                  type="password"
                  id="senhaConfirmar"
                  name="senhaConfirmar"
                  placeholder="Repita a nova senha"
                  autocomplete="new-password"
                  required
                />
                <button type="button" class="toggle-pass" data-target="senhaConfirmar" title="Mostrar/ocultar">👁</button>
              </div>
            </div>

            <div id="senhaMsg" class="senha-msg" role="status"></div>

            <button type="submit" class="btn-primary" id="btnAlterarSenha">
              Alterar senha
            </button>
          </form>
        </div>
      </main>

      <footer class="page-footer">
        <p>© 2026 GM Desporto — Gestão de Equipamentos Desportivos</p>
      </footer>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <script src="appShell.js"></script>
    <script src="perfil_senha.js"></script>
  </body>
</html>
